<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>演奏会アーカイブ - 彩シンフォニックバンド</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family:'Noto Sans JP', sans-serif; line-height:1.8; margin:0; background:#fff5e6; color:#4a4a4a; }
        .header { background:#2c3e50; color:white; padding:40px 20px; text-align:center; }
        nav { background:rgba(255,255,255,0.8); padding:15px; text-align:center; position:sticky; top:0; z-index:100; backdrop-filter:blur(5px); }
        nav a { margin:0 15px; text-decoration:none; color:#2c3e50; font-weight:bold; font-size:0.9rem; }
        .container { max-width:800px; margin:40px auto; padding:0 20px; }
        .archive-card { background:white; padding:30px; border-radius:15px; box-shadow:0 5px 15px rgba(0,0,0,0.05); margin-bottom:30px; }
        h2 { color:#e67e22; border-bottom:2px solid #eee; padding-bottom:10px; font-size:1.4rem; }
        .meta-info { font-size:0.9rem; color:#666; margin-bottom:20px; }
        .program-list { background:#fdf2e9; padding:20px; border-radius:10px; white-space:pre-wrap; }
    </style>
</head>
<body>
<div class="header"><h1>Concert Archive</h1><p>これまでの演奏の記録</p></div>
<nav>
    <a href="index.html">トップ</a>
    <a href="about.html">楽団紹介</a>
    <a href="parts.html">パート紹介</a>
    <a href="recruit.html">団員募集</a>
</nav>
<div class="container" id="archiveContainer">
    <p style="text-align:center; color:#999;">読み込み中...</p>
</div>

<script>
    const archives = JSON.parse(localStorage.getItem("concertArchives")) || [];
    const container = document.getElementById("archiveContainer");
    
    if(archives.length === 0) {
        container.innerHTML = "<p style='text-align:center;'>アーカイブは準備中です。</p>";
    } else {
        container.innerHTML = archives.map(a => `
            <div class="archive-card">
                <h2>${a.title}</h2>
                <div class="meta-info">📅 ${a.date} 📍 ${a.venue}</div>
                <div class="program-list"><strong>【演奏曲目】</strong><br>${a.program}</div>
            </div>
        `).join('');
    }
</script>
</body>
</html>
