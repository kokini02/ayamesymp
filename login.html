<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>ログイン - 彩シンフォニックバンド</title>
    <style>
        body { 
            font-family: 'Helvetica Neue', Arial, sans-serif; 
            background: #2c3e50; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
        }
        .login-card { 
            background: white; 
            padding: 40px; 
            border-radius: 15px; 
            text-align: center; 
            width: 320px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }
        h2 { color: #2c3e50; margin-bottom: 20px; }
        input { 
            width: 100%; 
            padding: 12px; 
            margin: 10px 0; 
            border: 1px solid #ddd; 
            border-radius: 8px; 
            box-sizing: border-box;
            outline: none;
        }
        input:focus { border-color: #e67e22; }
        button { 
            width: 100%; 
            padding: 12px; 
            background: #e67e22; 
            color: white; 
            border: none; 
            border-radius: 25px; 
            cursor: pointer; 
            font-weight: bold; 
            transition: 0.3s;
            margin-top: 10px;
        }
        button:hover { background: #d35400; }
        #error { 
            color: #e74c3c; 
            font-size: 0.85rem; 
            margin-top: 15px; 
            font-weight: bold;
            display: none; /* 初期状態は非表示 */
        }
        .back-link { 
            display: block;
            margin-top: 25px;
            color: #999;
            text-decoration: none;
            font-size: 0.8rem;
        }
        .back-link:hover { text-decoration: underline; }
    </style>
</head>
<body>

<div class="login-card">
    <h2>団員ログイン</h2>
    <input type="text" id="userid" placeholder="ユーザーID" autofocus>
    <input type="password" id="password" placeholder="パスワード">
    
    <button id="loginBtn">ログイン</button>
    
    <p id="error">IDまたはパスワードが違います</p>
    
    <a href="index.html" class="back-link">← トップページへ戻る</a>
</div>

<script type="module">
    // Firebase設定を読み込む
    import { db, doc, getDoc } from './firebase-config.js';

    const loginBtn = document.getElementById('loginBtn');
    const idInput = document.getElementById('userid');
    const passInput = document.getElementById('password');
    const errorMsg = document.getElementById('error');

    // ログイン処理のメイン関数
    async function checkLogin() {
        const inputId = idInput.value;
        const inputPass = passInput.value;

        try {
            // Firebaseから最新の認証情報を取得
            const docSnap = await getDoc(doc(db, "ayameData", "website"));
            
            // デフォルト値の設定
            let masterId = "1234";
            let masterPass = "1234";

            // クラウドに保存されたデータがあれば上書き
            if (docSnap.exists() && docSnap.data().adminAuth) {
                masterId = docSnap.data().adminAuth.id;
                masterPass = docSnap.data().adminAuth.pass;
            }

            if (inputId === masterId && inputPass === masterPass) {
                // 認証成功
                sessionStorage.setItem('isLoggedIn', 'true');
                window.location.href = 'admin.html';
            } else {
                // 認証失敗
                errorMsg.style.display = 'block';
                passInput.value = "";
            }
        } catch (e) {
            console.error(e);
            alert("通信エラーが発生しました。インターネット接続を確認してください。");
        }
    }

    // ボタンクリック時の挙動
    loginBtn.addEventListener('click', checkLogin);

    // エンターキー（Enter）対応
    const handleEnter = (event) => {
        if (event.key === 'Enter') {
            checkLogin();
        }
    };

    idInput.addEventListener('keydown', handleEnter);
    passInput.addEventListener('keydown', handleEnter);

</script>

</body>
</html>
