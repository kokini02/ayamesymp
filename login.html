<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>ログイン - 彩シンフォニックバンド</title>
    <style>
        body { font-family: sans-serif; background: #2c3e50; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-card { background: white; padding: 40px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); text-align: center; width: 320px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #e67e22; color: white; border: none; border-radius: 25px; font-weight: bold; cursor: pointer; }
        .error { color: #e74c3c; font-size: 0.8rem; margin-top: 10px; display: none; }
    </style>
</head>
<body>

<div class="login-card">
    <h2>団員ログイン</h2>
    <input type="text" id="userid" placeholder="ユーザーID">
    <input type="password" id="password" placeholder="パスワード">
    <button onclick="checkLogin()">ログイン</button>
    <p id="error-msg" class="error">IDまたはパスワードが違います</p>
    <p style="font-size: 0.7rem; color: #999; margin-top: 20px;"><a href="index.html" style="color: #999;">トップへ戻る</a></p>
</div>

<script>
    function checkLogin() {
        const idInput = document.getElementById('userid').value;
        const passInput = document.getElementById('password').value;
        const errorMsg = document.getElementById('error-msg');

        // 保存された設定を読み込む（なければデフォルト値：admin / 1234）
        const auth = JSON.parse(localStorage.getItem('adminAuth')) || { id: 'admin', pass: '1234' };

        if (idInput === auth.id && passInput === auth.pass) {
            // ログイン成功：セッション情報を一時的に保存
            sessionStorage.setItem('isLoggedIn', 'true');
            window.location.href = 'admin.html';
        } else {
            errorMsg.style.display = 'block';
        }
    }
</script>
</body>
</html>
