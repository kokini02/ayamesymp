<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>ログイン - 彩シンフォニックバンド</title>
    <style>
        body { 
            font-family: 'Helvetica Neue', Arial, sans-serif; 
            background: #2c3e50; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
        }
        .login-card { 
            background: white; 
            padding: 40px; 
            border-radius: 15px; 
            text-align: center; 
            width: 320px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }
        h2 { color: #2c3e50; margin-bottom: 20px; }
        input { 
            width: 100%; 
            padding: 12px; 
            margin: 10px 0; 
            border: 1px solid #ddd; 
            border-radius: 8px; 
            box-sizing: border-box;
        }
        button { 
            width: 100%; 
            padding: 12px; 
            background: #e67e22; 
            color: white; 
            border: none; 
            border-radius: 25px; 
            cursor: pointer; 
            font-weight: bold; 
            transition: 0.3s;
            margin-top: 10px;
        }
        button:hover { background: #d35400; }
        #error { 
            color: #e74c3c; 
            font-size: 0.85rem; 
            margin-top: 15px; 
            font-weight: bold;
        }
        .back-link { 
            display: block;
            margin-top: 25px;
            color: #999;
            text-decoration: none;
            font-size: 0.8rem;
        }
        .back-link:hover { text-decoration: underline; }
    </style>
</head>
<body>

<div class="login-card">
    <h2>団員ログイン</h2>
    <input type="text" id="userid" placeholder="ユーザーID">
    <input type="password" id="password" placeholder="パスワード">
    
    <button onclick="checkLogin()">ログイン</button>
    
    <p id="error" style="display:none;">IDまたはパスワードが違います</p>
    
    <a href="index.html" class="back-link">← トップページへ戻る</a>
</div>

<script>
    function checkLogin() {
        const idInput = document.getElementById('userid').value;
        const passInput = document.getElementById('password').value;
        const errorMsg = document.getElementById('error');

        // localStorageに設定がない場合のデフォルト値を ID:1234 / PASS:1234 に設定
        const auth = JSON.parse(localStorage.getItem('adminAuth')) || { id: '1234', pass: '1234' };

        if (idInput === auth.id && passInput === auth.pass) {
            // 認証成功：セッションストレージにログインフラグを立てる
            sessionStorage.setItem('isLoggedIn', 'true');
            // 管理画面へ移動
            window.location.href = 'admin.html';
        } else {
            // 認証失敗：エラーメッセージを表示
            errorMsg.style.display = 'block';
            // 入力欄を赤くするなどの視覚効果（任意）
            document.getElementById('password').value = "";
        }
    }
</script>

</body>
</html>
