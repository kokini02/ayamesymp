<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>在籍人数詳細 - 彩シンフォニックバンド</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family:'Noto Sans JP', sans-serif; line-height:1.6; margin:0; background:#fff5e6; color:#4a4a4a; }
        .header { background:#e67e22; color:white; padding:40px 20px; text-align:center; }
        nav { background:rgba(255,255,255,0.9); padding:15px; text-align:center; position:sticky; top:0; z-index:100; }
        nav a { margin:0 15px; text-decoration:none; color:#2c3e50; font-weight:bold; font-size:0.9rem; }
        .container { max-width:900px; margin:40px auto; padding:0 20px; }
        
        h2.term-title { text-align: center; color: #2c3e50; margin-bottom: 30px; }
        
        .table-wrapper { background: white; border-radius: 15px; overflow: hidden; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px 15px; text-align: center; border-bottom: 1px solid #eee; }
        th { background: #2c3e50; color: white; font-size: 0.9rem; }
        tr:nth-child(even) { background: #fafafa; }
        .part-name { font-weight: bold; text-align: left; background: #fffcf5; }
        .status-badge { font-size: 0.8rem; padding: 3px 8px; border-radius: 10px; background: #eee; }
        .status-urgent { background: #ffebee; color: #c62828; font-weight: bold; } /* 大募集用 */
        
        .total-row { background: #fdf2e9 !important; font-weight: bold; font-size: 1.1rem; }
    </style>
</head>
<body>

<div class="header">
    <h1>Members Status</h1>
    <p>団員構成および募集状況</p>
</div>

<nav>
    <a href="index.html">トップ</a>
    <a href="about.html">楽団紹介</a>
    <a href="parts.html">パート紹介</a>
    <a href="recruit.html">団員募集</a>
</nav>

<div class="container">
    <h2 id="displayTerm" class="term-title">2026年度 構成</h2>
    
    <div class="table-wrapper">
        <table>
            <thead>
                <tr>
                    <th>パート</th>
                    <th>活動中</th>
                    <th>休団中</th>
                    <th>募集状況</th>
                    <th>備考</th>
                </tr>
            </thead>
            <tbody id="memberTableBody">
                </tbody>
            <tfoot>
                <tr class="total-row">
                    <td>合計</td>
                    <td id="totalAct">0</td>
                    <td id="totalRest">0</td>
                    <td colspan="2" id="grandTotal">総員: 0名</td>
                </tr>
            </tfoot>
        </table>
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        const data = JSON.parse(localStorage.getItem('fullMemberData'));
        if(!data) return;

        document.getElementById('displayTerm').innerText = data.term || "在籍状況";
        const tbody = document.getElementById('memberTableBody');
        
        tbody.innerHTML = data.list.map(d => {
            const statusClass = d.status.includes("大募集") ? "status-badge status-urgent" : "status-badge";
            return `
                <tr>
                    <td class="part-name">${d.part}</td>
                    <td>${d.act}</td>
                    <td>${d.rest || "---"}</td>
                    <td><span class="${statusClass}">${d.status || "---"}</span></td>
                    <td style="text-align:left; font-size:0.85rem;">${d.note || ""}</td>
                </tr>
            `;
        }).join('');

        document.getElementById('totalAct').innerText = data.totalAct;
        document.getElementById('totalRest').innerText = data.totalRest;
        document.getElementById('grandTotal').innerText = `総員: ${data.totalAct + data.totalRest}名`;
    });
</script>

</body>
</html>
