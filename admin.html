<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>管理画面 - 彩シンフォニックバンド</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary:#2c3e50; --accent:#e67e22; --bg:#f4f6f8; }
        body { margin:0; font-family:'Noto Sans JP', sans-serif; background:var(--bg); }
        .header { background:var(--primary); color:white; padding:20px; text-align:center; font-size:1.5rem; font-weight:bold; }
        .container { max-width:900px; margin:auto; padding:40px 20px; display:grid; gap:30px; }
        .card { background:white; padding:30px; border-radius:15px; box-shadow:0 10px 30px rgba(0,0,0,0.05); }
        label { display:block; margin-top:15px; font-weight:bold; }
        input, textarea { width:100%; padding:12px; margin-top:8px; border-radius:8px; border:1px solid #ddd; }
        button { margin-top:20px; width:100%; padding:15px; border:none; border-radius:30px; background:var(--primary); color:white; font-weight:bold; cursor:pointer; }
    </style>
</head>
<body>
<div class="header">管理画面</div>
<div class="container">
    <div style="text-align:center;"><a href="index.html">トップ確認</a></div>
    <div class="card"><h2>🎵 演奏会情報</h2>
        <label>タイトル</label><input id="title"><label>日付</label><input id="date"><label>会場</label><input id="venue"><label>時間</label><input id="time"><label>料金</label><input id="price"><label>曲目</label><textarea id="program"></textarea>
        <button onclick="saveConcert()">演奏会を更新</button>
    </div>
    <div class="card"><h2>🎺 募集状況</h2>
        <label>木管</label><input id="rW"><label>金管</label><input id="rB"><label>打楽器</label><input id="rP">
        <button onclick="saveRecruit()" style="background:var(--accent);">募集状況を更新</button>
    </div>
    <div class="card"><h2>🏆 コンクール実績追加</h2>
        <input id="aY" placeholder="年度"><input id="aN" placeholder="大会名"><input id="aR" placeholder="結果">
        <button onclick="addAward()" style="background:#27ae60;">実績を追加</button>
    </div>
    <div class="card"><h2>✏️ ブログ投稿</h2>
        <input id="bT" placeholder="タイトル"><input id="bD" placeholder="日付"><textarea id="bC" placeholder="内容"></textarea>
        <button onclick="addBlog()">投稿</button>
    </div>
    <div class="card" style="border:2px solid red;"><h2>🔐 ログイン設定</h2>
        <input id="newId" placeholder="新しいID"><input id="newPass" type="password" placeholder="新しいパス">
        <button onclick="updateAuth()" style="background:red;">認証情報を更新</button>
    </div>
</div>
<script>
    if (sessionStorage.getItem('isLoggedIn') !== 'true') { window.location.href = 'login.html'; }
    function saveConcert(){
        const data = { title:title.value, date:date.value, venue:venue.value, time:time.value, price:price.value, program:program.value };
        localStorage.setItem("concertData", JSON.stringify(data)); alert("保存しました");
    }
    function saveRecruit(){
        const data = { wood:rW.value, brass:rB.value, perc:rP.value };
        localStorage.setItem("recruitData", JSON.stringify(data)); alert("募集状況を更新しました");
    }
    function addAward(){
        const award = { year:aY.value, name:aN.value, result:aR.value };
        let awards = JSON.parse(localStorage.getItem("awards")) || [];
        awards.unshift(award); localStorage.setItem("awards", JSON.stringify(awards)); alert("実績を追加しました");
    }
    function addBlog(){
        const blog = { title:bT.value, date:bD.value, content:bC.value };
        let blogs = JSON.parse(localStorage.getItem("blogs")) || [];
        blogs.unshift(blog); localStorage.setItem("blogs", JSON.stringify(blogs)); alert("ブログを投稿しました");
    }
    function updateAuth(){
        const auth = { id:newId.value, pass:newPass.value };
        localStorage.setItem('adminAuth', JSON.stringify(auth)); alert("更新完了。次回から反映されます。");
    }
</script>
</body>
</html>
