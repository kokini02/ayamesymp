<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>管理画面 - 彩シンフォニックバンド</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary:#2c3e50; --accent:#e67e22; --bg:#f4f6f8; }
        body { margin:0; font-family:'Noto Sans JP', sans-serif; background:var(--bg); padding-bottom: 50px; }
        .header { background:var(--primary); color:white; padding:20px; text-align:center; font-size:1.5rem; font-weight:bold; }
        .container { max-width:1100px; margin:auto; padding:40px 20px; display:grid; gap:30px; }
        .card { background:white; padding:30px; border-radius:15px; box-shadow:0 10px 30px rgba(0,0,0,0.05); }
        .card h2 { margin-top:0; color:var(--primary); border-left:5px solid var(--accent); padding-left:10px; margin-bottom: 20px; }
        label { display:block; margin-top:15px; font-weight:bold; font-size: 0.9rem; }
        input, textarea, select { width:100%; padding:12px; margin-top:8px; border-radius:8px; border:1px solid #ddd; box-sizing: border-box; }
        button { margin-top:20px; width:100%; padding:15px; border:none; border-radius:30px; background:var(--primary); color:white; font-weight:bold; cursor:pointer; transition: 0.3s; }
        button:hover { opacity: 0.8; transform: translateY(-2px); }
        
        .list-item { border-bottom: 1px solid #eee; padding: 10px 0; display: flex; justify-content: space-between; align-items: center; font-size: 0.85rem; }
        .delete-btn { background: #e74c3c; color: white; padding: 5px 12px; font-size: 0.75rem; width: auto; margin: 0; }

        table { width: 100%; border-collapse: collapse; font-size: 0.8rem; margin-top: 10px; }
        th, td { border: 1px solid #eee; padding: 8px; text-align: center; }
        th { background: #f8f9fa; position: sticky; top: 0; z-index: 10; }
        input[type="number"] { padding: 8px; width: 60px; }

        .gallery-preview { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 10px; margin-top: 15px; }
        .gallery-item { position: relative; }
        .gallery-item img { width: 100%; aspect-ratio: 1/1; object-fit: cover; border-radius: 5px; }
        
        /* ヒーロープレビュー用 */
        #heroPreview img { width: 100%; max-height: 250px; object-fit: cover; border-radius: 8px; border: 1px solid #ddd; margin-top: 10px; }
    </style>
</head>
<body>

<div class="header">彩シンフォニックバンド 管理画面</div>

<div class="container">
    <div style="text-align:center;"><a href="index.html" style="font-weight: bold; color: var(--primary); text-decoration: none;">← サイトを確認する</a></div>

    <div class="card" style="border: 2px solid var(--primary);">
        <h2>🖼️ メインビジュアルの設定</h2>
        <p style="font-size: 0.8rem; color: #666;">トップページの一番上に表示される背景画像を設定します。</p>
        <input type="file" id="heroInput" accept="image/*">
        <button onclick="uploadHero()" style="background: var(--primary);">背景画像を更新する</button>
        <div id="heroPreview"></div>
    </div>

    <div class="card">
        <h2>✏️ Activity Blog の投稿・管理</h2>
        <label>記事タイトル</label><input id="blogT" placeholder="練習風景、本番報告など">
        <label>投稿日</label><input id="blogD" type="date">
        <label>内容</label><textarea id="blogC" rows="4"></textarea>
        <button onclick="addBlog()" style="background:#8e44ad;">この内容で投稿する</button>
        <div id="blogManagerList" style="margin-top:20px;"></div>
    </div>

    <div class="card">
        <h2>👥 各パートの詳細データ入力</h2>
        <p style="font-size: 0.8rem; color: #666;">
            ※「状況」を更新して保存すると、トップページの <strong>Join Us!</strong> セクションも自動的に「募集中/急募/募集なし」に書き換わります。
        </p>
        <label>表示学期名</label><input id="termName" placeholder="2026年度 春学期">
        <div style="overflow-x: auto; max-height: 500px;">
            <table>
                <thead><tr><th>パート</th><th>活動</th><th>休団</th><th>募集数</th><th>状況</th><th>備考</th></tr></thead>
                <tbody id="memberInputs"></tbody>
            </table>
        </div>
        <button onclick="saveMemberTable()" style="background:#16a085;">全ページのデータを一括更新</button>
    </div>

    <div class="card">
        <h2>🎵 次回の演奏会 (Next Concert)</h2>
        <label>タイトル</label><input id="title">
        <label>日付</label><input id="date">
        <label>会場</label><input id="venue">
        <label>時間</label><input id="time">
        <label>曲目</label><textarea id="program" rows="3"></textarea>
        <button onclick="saveConcert()">演奏会情報を更新</button>
    </div>

    <div class="card">
        <h2>📖 楽団紹介・実績 (About)</h2>
        <label>紹介文</label><textarea id="aboutText" rows="4"></textarea>
        <button onclick="saveAboutText()" style="background:#3498db;">紹介文を更新</button>
        <h3 style="margin-top:20px;">🏆 実績追加</h3>
        <div style="display: flex; gap: 5px;">
            <input id="awardYear" placeholder="年度" style="width:20%">
            <input id="awardName" placeholder="大会名" style="width:50%">
            <input id="awardResult" placeholder="結果" style="width:30%">
        </div>
        <button onclick="addAward()" style="background:#27ae60;">実績追加</button>
        <div id="awardList"></div>
    </div>

    <div class="card">
        <h2>📸 フォトギャラリー</h2>
        <input type="file" id="photoInput" accept="image/*" multiple>
        <button onclick="uploadPhotos()" style="background:#3498db;">写真を追加</button>
        <div id="galleryStatus" class="gallery-preview"></div>
        <button onclick="clearPhotos()" style="background:#95a5a6; font-size: 0.75rem; width: auto; padding: 5px 15px;">全削除</button>
    </div>

    <div class="card" style="border:2px solid #e74c3c;">
        <h2>🔐 ログイン設定</h2>
        <label>新しいユーザーID</label><input id="newId">
        <label>新しいパスワード</label><input id="newPass" type="password">
        <button onclick="updateAuth()" style="background:#e74c3c;">設定を保存</button>
    </div>
</div>

<script>
    if (sessionStorage.getItem('isLoggedIn') !== 'true') { window.location.href = 'login.html'; }

    const partsList = ["フルート", "オーボエ", "ファゴット", "クラリネット", "バスクラリネット", "アルトサックス", "テナーサックス", "バリトンサックス", "ホルン", "トランペット", "トロンボーン", "バストロンボーン", "ユーフォニアム", "チューバ", "弦バス", "打楽器", "ハープ"];
    const groupWood = ["フルート", "オーボエ", "ファゴット", "クラリネット", "バスクラリネット", "アルトサックス", "テナーサックス", "バリトンサックス"];
    const groupBrass = ["ホルン", "トランペット", "トロンボーン", "バストロンボーン", "ユーフォニアム"];
    const groupPerc = ["チューバ", "コントラバス", "打楽器", "ハープ"];

    // --- メインヒーロー画像アップロード ---
    async function uploadHero() {
        const file = document.getElementById('heroInput').files[0];
        if (!file) return alert("画像を選択してください");
        const resizedHero = await resizeImage(file, 1200, 800);
        try {
            localStorage.setItem("heroImageData", resizedHero);
            renderHeroPreview();
            alert("トップページの画像を更新しました！");
        } catch (e) {
            alert("保存に失敗しました。画像のファイルサイズを小さくしてください。");
        }
    }

    function renderHeroPreview() {
        const heroData = localStorage.getItem("heroImageData");
        const container = document.getElementById('heroPreview');
        if (heroData) {
            container.innerHTML = `<p style="font-size:0.7rem; margin-top:10px;">現在の設定:</p><img src="${heroData}">`;
        } else {
            container.innerHTML = "<p style='color:#ccc; margin-top:10px;'>設定なし（デフォルトが表示されます）</p>";
        }
    }

    // --- 在籍詳細・サマリー自動集計 ---
    function saveMemberTable() {
        const rows = document.getElementById('memberInputs').querySelectorAll('tr');
        const list = [];
        rows.forEach((row, i) => {
            list.push({
                part: partsList[i],
                act: parseInt(row.querySelector('.in-act').value)||0,
                rest: parseInt(row.querySelector('.in-rest').value)||0,
                count: parseInt(row.querySelector('.in-count').value)||0,
                status: row.querySelector('.in-status').value,
                note: row.querySelector('.in-note').value
            });
        });
        const getSummary = (group) => {
            const groupData = list.filter(item => group.includes(item.part));
            if (groupData.some(d => d.status === "急募")) return "急募あり！";
            if (groupData.some(d => d.status === "募集中")) return "募集中";
            return "募集なし";
        };
        const summaryData = {
            wood: getSummary(groupWood),
            brass: getSummary(groupBrass),
            perc: getSummary(groupPerc)
        };
        localStorage.setItem('fullMemberData', JSON.stringify({ term: termName.value, list }));
        localStorage.setItem('recruitData', JSON.stringify(summaryData));
        alert("詳細データとトップページのJoin Us!を更新しました！");
    }

    function initMemberForm() {
        const tbody = document.getElementById('memberInputs');
        const saved = JSON.parse(localStorage.getItem('fullMemberData')) || { term: "", list: [] };
        tbody.innerHTML = partsList.map(part => {
            const row = saved.list.find(d => d.part === part) || { act:0, rest:0, count:0, status:"なし", note:"" };
            return `<tr>
                <td><strong>${part}</strong></td>
                <td><input type="number" class="in-act" value="${row.act}" min="0"></td>
                <td><input type="number" class="in-rest" value="${row.rest}" min="0"></td>
                <td><input type="number" class="in-count" value="${row.count}" min="0"></td>
                <td>
                    <select class="in-status">
                        <option value="募集中" ${row.status==='募集中'?'selected':''}>募集中</option>
                        <option value="急募" ${row.status==='急募'?'selected':''}>急募</option>
                        <option value="なし" ${row.status==='なし'?'selected':''}>なし</option>
                    </select>
                </td>
                <td><input type="text" class="in-note" value="${row.note}"></td>
            </tr>`;
        }).join('');
        termName.value = saved.term || "";
    }

    // --- ブログ・お知らせ保存 ---
    function addBlog() {
        if(!blogT.value || !blogC.value) return alert("タイトルと内容を入力してください");
        let blogs = JSON.parse(localStorage.getItem("blogs")) || [];
        blogs.unshift({ title:blogT.value, date:blogD.value, content:blogC.value });
        localStorage.setItem("blogs", JSON.stringify(blogs));
        blogT.value=""; blogC.value=""; displayBlogList(); alert("投稿完了");
    }
    function displayBlogList() {
        const blogs = JSON.parse(localStorage.getItem("blogs")) || [];
        blogManagerList.innerHTML = blogs.map((b, i) => `<div class="list-item"><span>[${b.date}] ${b.title}</span><button class="delete-btn" onclick="deleteBlog(${i})">削除</button></div>`).join('');
    }
    function deleteBlog(i) {
        if(!confirm("削除しますか？")) return;
        let blogs = JSON.parse(localStorage.getItem("blogs")) || [];
        blogs.splice(i, 1); localStorage.setItem("blogs", JSON.stringify(blogs)); displayBlogList();
    }

    function saveConcert(){
        localStorage.setItem("concertData", JSON.stringify({ title:title.value, date:date.value, venue:venue.value, time:time.value, program:program.value })); alert("保存完了");
    }
    function saveAboutText() { localStorage.setItem("aboutContent", aboutText.value); alert("紹介文を保存しました"); }
    function addAward() {
        let awards = JSON.parse(localStorage.getItem("awards")) || [];
        awards.unshift({ year:awardYear.value, name:awardName.value, result:awardResult.value });
        localStorage.setItem("awards", JSON.stringify(awards)); displayAwardList();
    }
    function displayAwardList() {
        const awards = JSON.parse(localStorage.getItem("awards")) || [];
        awardList.innerHTML = awards.map((a, i) => `<div class="list-item"><span>${a.year} ${a.name} ${a.result}</span><button class="delete-btn" onclick="deleteAward(${i})">削除</button></div>`).join('');
    }
    function deleteAward(i) {
        let awards = JSON.parse(localStorage.getItem("awards")) || [];
        awards.splice(i, 1); localStorage.setItem("awards", JSON.stringify(awards)); displayAwardList();
    }

    // --- 画像リサイズ共通処理 ---
    function resizeImage(file, maxWidth, maxHeight) {
        return new Promise((resolve) => {
            const reader = new FileReader(); reader.readAsDataURL(file);
            reader.onload = (e) => {
                const img = new Image(); img.src = e.target.result;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    let w = img.width, h = img.height;
                    if (w > h) { if (w > maxWidth) { h *= maxWidth / w; w = maxWidth; } }
                    else { if (h > maxHeight) { w *= maxHeight / h; h = maxHeight; } }
                    canvas.width = w; canvas.height = h;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, w, h);
                    resolve(canvas.toDataURL('image/jpeg', 0.7));
                };
            };
        });
    }

    // --- フォトギャラリー ---
    async function uploadPhotos() {
        const files = photoInput.files;
        let gallery = JSON.parse(localStorage.getItem("galleryData")) || [];
        for (let file of files) {
            const resized = await resizeImage(file, 800, 600);
            gallery.unshift(resized); if (gallery.length > 12) gallery.pop();
        }
        localStorage.setItem("galleryData", JSON.stringify(gallery)); renderPreview();
    }
    function renderPreview() {
        const g = JSON.parse(localStorage.getItem("galleryData")) || [];
        galleryStatus.innerHTML = g.map((src, i) => `<div class="gallery-item"><img src="${src}"><button style="position:absolute;top:0;right:0;" onclick="deletePhoto(${i})">×</button></div>`).join('');
    }
    function deletePhoto(i) {
        let g = JSON.parse(localStorage.getItem("galleryData")) || []; g.splice(i,1);
        localStorage.setItem("galleryData", JSON.stringify(g)); renderPreview();
    }
    function clearPhotos() { localStorage.removeItem("galleryData"); renderPreview(); }

    function updateAuth(){ localStorage.setItem('adminAuth', JSON.stringify({ id:newId.value, pass:newPass.value })); alert("更新完了"); }

    window.onload = () => {
        renderHeroPreview(); // ヒーロー画像プレビュー
        initMemberForm(); displayBlogList(); displayAwardList(); renderPreview();
        const c = JSON.parse(localStorage.getItem("concertData"));
        if(c){ title.value=c.title; date.value=c.date; venue.value=c.venue; time.value=c.time; program.value=c.program; }
        aboutText.value = localStorage.getItem("aboutContent") || "";
        const auth = JSON.parse(localStorage.getItem('adminAuth')) || { id: '1234', pass: '1234' };
        newId.value = auth.id;
    };
</script>
</body>
</html>
