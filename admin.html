<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>管理画面 - 彩シンフォニックバンド</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary:#2c3e50; --accent:#e67e22; --bg:#f4f6f8; }
        body { margin:0; font-family:'Noto Sans JP', sans-serif; background:var(--bg); padding-bottom: 50px; }
        .header { background:var(--primary); color:white; padding:20px; text-align:center; font-size:1.5rem; font-weight:bold; }
        .container { max-width:1100px; margin:auto; padding:40px 20px; display:grid; gap:30px; }
        .card { background:white; padding:30px; border-radius:15px; box-shadow:0 10px 30px rgba(0,0,0,0.05); }
        .card h2 { margin-top:0; color:var(--primary); border-left:5px solid var(--accent); padding-left:10px; margin-bottom: 20px; }
        label { display:block; margin-top:15px; font-weight:bold; font-size: 0.9rem; }
        input, textarea, select { width:100%; padding:12px; margin-top:8px; border-radius:8px; border:1px solid #ddd; box-sizing: border-box; }
        button { margin-top:20px; width:100%; padding:15px; border:none; border-radius:30px; background:var(--primary); color:white; font-weight:bold; cursor:pointer; transition: 0.3s; }
        button:hover { opacity: 0.8; transform: translateY(-2px); }
        
        .list-item { border-bottom: 1px solid #eee; padding: 15px 0; display: flex; justify-content: space-between; align-items: center; font-size: 0.85rem; }
        .delete-btn { background: #e74c3c; color: white; padding: 5px 12px; font-size: 0.75rem; width: auto; margin: 0; }

        table { width: 100%; border-collapse: collapse; font-size: 0.8rem; margin-top: 10px; }
        th, td { border: 1px solid #eee; padding: 8px; text-align: center; }
        th { background: #f8f9fa; position: sticky; top: 0; z-index: 10; }
        input[type="number"] { padding: 8px; width: 60px; }

        .gallery-preview { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 10px; margin-top: 15px; }
        .gallery-item { position: relative; }
        .gallery-item img { width: 100%; aspect-ratio: 1/1; object-fit: cover; border-radius: 5px; }
        
        #heroPreview img { width: 100%; max-height: 250px; object-fit: cover; border-radius: 8px; border: 1px solid #ddd; margin-top: 10px; }
    </style>
</head>
<body>

<div class="header">彩シンフォニックバンド 管理画面 (Cloud)</div>

<div class="container">
    <div style="text-align:center;"><a href="index.html" style="font-weight: bold; color: var(--primary); text-decoration: none;">← サイトを確認する</a></div>

    <div class="card" style="border: 2px solid var(--primary);">
        <h2>🖼️ メインビジュアルの設定</h2>
        <input type="file" id="heroInput" accept="image/*">
        <button id="btnHero" style="background: var(--primary);">背景画像を更新する</button>
        <div id="heroPreview"></div>
    </div>

    <div class="card" style="border: 2px solid #27ae60;">
        <h2>📚 過去の演奏記録 (Archive) の管理</h2>
        <p style="font-size: 0.8rem; color: #666;">「演奏記録」ページに表示されるアーカイブを追加・削除します。</p>
        <label>演奏会タイトル</label><input id="arcT" placeholder="第〇回 定期演奏会">
        <label>開催日</label><input id="arcD" placeholder="202X年12月20日">
        <label>会場</label><input id="arcV" placeholder="彩市民ホール">
        <label>演奏曲目</label><textarea id="arcP" rows="4" placeholder="1. アルヴァマー序曲&#13;&#10;2. 吹奏楽のための第一組曲..."></textarea>
        <button id="btnArchive" style="background:#27ae60;">この内容をアーカイブに追加</button>
        <div id="archiveManagerList" style="margin-top:20px;"></div>
    </div>

    <div class="card">
        <h2>✏️ Activity Blog の投稿・管理</h2>
        <label>記事タイトル</label><input id="blogT" placeholder="練習風景、本番報告など">
        <label>投稿日</label><input id="blogD" type="date">
        <label>内容</label><textarea id="blogC" rows="4"></textarea>
        <button id="btnBlog" style="background:#8e44ad;">この内容で投稿する</button>
        <div id="blogManagerList" style="margin-top:20px;"></div>
    </div>

    <div class="card">
        <h2>👥 各パートの詳細データ入力</h2>
        <label>表示学期名</label><input id="termName" placeholder="2026年度 春学期">
        <div style="overflow-x: auto; max-height: 500px;">
            <table>
                <thead><tr><th>パート</th><th>活動</th><th>休団</th><th>募集数</th><th>状況</th><th>備考</th></tr></thead>
                <tbody id="memberInputs"></tbody>
            </table>
        </div>
        <button id="btnMember" style="background:#16a085;">全ページのデータを一括更新</button>
    </div>

    <div class="card">
        <h2>🎵 次回の演奏会 (Next Concert)</h2>
        <label>タイトル</label><input id="title">
        <label>日付</label><input id="date">
        <label>会場</label><input id="venue">
        <label>時間</label><input id="time">
        <label>曲目</label><textarea id="program" rows="3"></textarea>
        <button id="btnConcert">演奏会情報を更新</button>
    </div>

    <div class="card">
        <h2>📖 楽団紹介・実績 (About)</h2>
        <label>紹介文</label><textarea id="aboutText" rows="4"></textarea>
        <button id="btnAbout" style="background:#3498db;">紹介文を更新</button>
        <h3 style="margin-top:20px;">🏆 実績追加</h3>
        <div style="display: flex; gap: 5px;">
            <input id="awardYear" placeholder="年度" style="width:20%">
            <input id="awardName" placeholder="大会名" style="width:50%">
            <input id="awardResult" placeholder="結果" style="width:30%">
        </div>
        <button id="btnAward" style="background:#27ae60;">実績追加</button>
        <div id="awardList"></div>
    </div>

    <div class="card">
        <h2>📸 フォトギャラリー</h2>
        <input type="file" id="photoInput" accept="image/*" multiple>
        <button id="btnGallery" style="background:#3498db;">写真を追加</button>
        <div id="galleryStatus" class="gallery-preview"></div>
        <button id="btnClearGallery" style="background:#95a5a6; font-size: 0.75rem; width: auto; padding: 5px 15px;">全削除</button>
    </div>

    <div class="card" style="border:2px solid #e74c3c;">
        <h2>🔐 ログイン設定</h2>
        <label>新しいユーザーID</label><input id="newId">
        <label>新しいパスワード</label><input id="newPass" type="password">
        <button id="btnAuth" style="background:#e74c3c;">設定を保存</button>
    </div>
</div>

<script type="module">
    import { db, doc, setDoc, getDoc } from './firebase-config.js';

    if (sessionStorage.getItem('isLoggedIn') !== 'true') { window.location.href = 'login.html'; }

    const partsList = ["フルート", "オーボエ", "ファゴット", "クラリネット", "バスクラリネット", "アルトサックス", "テナーサックス", "バリトンサックス", "ホルン", "トランペット", "トロンボーン", "バストロンボーン", "ユーフォニアム", "チューバ", "弦バス", "打楽器", "ハープ"];
    const groupWood = ["フルート", "オーボエ", "ファゴット", "クラリネット", "バスクラリネット", "アルトサックス", "テナーサックス", "バリトンサックス"];
    const groupBrass = ["ホルン", "トランペット", "トロンボーン", "バストロンボーン", "ユーフォニアム"];
    const groupPerc = ["チューバ", "弦バス", "打楽器", "ハープ"];

    const websiteRef = doc(db, "ayameData", "website");

    // --- Firebase共通保存関数 ---
    async function updateFirebase(fieldData) {
        try {
            await setDoc(websiteRef, fieldData, { merge: true });
        } catch (e) {
            console.error(e);
            alert("保存に失敗しました。");
        }
    }

    // --- メインビジュアル ---
    async function uploadHero() {
        const file = document.getElementById('heroInput').files[0];
        if (!file) return alert("画像を選択してください");
        const resizedHero = await resizeImage(file, 1200, 800);
        await updateFirebase({ heroImageData: resizedHero });
        renderHeroPreview(resizedHero);
        alert("更新完了");
    }
    function renderHeroPreview(src) {
        const container = document.getElementById('heroPreview');
        if (src) container.innerHTML = `<img src="${src}">`;
    }

    // --- 過去の演奏会アーカイブ管理 ---
    async function addArchive() {
        const t = arcT.value, d = arcD.value, v = arcV.value, p = arcP.value;
        if(!t || !d) return alert("タイトルと日付を入力してください");
        const docSnap = await getDoc(websiteRef);
        let archives = docSnap.exists() ? (docSnap.data().concertArchives || []) : [];
        archives.unshift({ title:t, date:d, venue:v, program:p });
        await updateFirebase({ concertArchives: archives });
        arcT.value=""; arcD.value=""; arcV.value=""; arcP.value="";
        displayArchiveList(archives);
        alert("アーカイブに追加しました！");
    }
    function displayArchiveList(archives) {
        archiveManagerList.innerHTML = archives.map((a, i) => `
            <div class="list-item">
                <span>[${a.date}] ${a.title}</span>
                <button class="delete-btn" onclick="window.deleteArchive(${i})">削除</button>
            </div>
        `).join('');
    }
    window.deleteArchive = async (i) => {
        if(!confirm("削除しますか？")) return;
        const docSnap = await getDoc(websiteRef);
        let archives = docSnap.data().concertArchives;
        archives.splice(i, 1);
        await updateFirebase({ concertArchives: archives });
        displayArchiveList(archives);
    };

    // --- ブログ投稿 ---
    async function addBlog() {
        const t = blogT.value, d = blogD.value, c = blogC.value;
        if(!t || !c) return alert("入力してください");
        const docSnap = await getDoc(websiteRef);
        let blogs = docSnap.exists() ? (docSnap.data().blogs || []) : [];
        blogs.unshift({ title:t, date:d, content:c });
        await updateFirebase({ blogs: blogs });
        blogT.value=""; blogC.value="";
        displayBlogList(blogs);
        alert("投稿完了！");
    }
    function displayBlogList(blogs) {
        blogManagerList.innerHTML = blogs.map((b, i) => `<div class="list-item"><span>[${b.date}] ${b.title}</span><button class="delete-btn" onclick="window.deleteBlog(${i})">削除</button></div>`).join('');
    }
    window.deleteBlog = async (i) => {
        if(!confirm("削除？")) return;
        const docSnap = await getDoc(websiteRef);
        let blogs = docSnap.data().blogs;
        blogs.splice(i, 1);
        await updateFirebase({ blogs: blogs });
        displayBlogList(blogs);
    };

    // --- パート詳細 ---
    async function saveMemberTable() {
        const rows = document.getElementById('memberInputs').querySelectorAll('tr');
        const list = [];
        rows.forEach((row, i) => {
            list.push({
                part: partsList[i],
                act: parseInt(row.querySelector('.in-act').value)||0,
                rest: parseInt(row.querySelector('.in-rest').value)||0,
                count: parseInt(row.querySelector('.in-count').value)||0,
                status: row.querySelector('.in-status').value,
                note: row.querySelector('.in-note').value
            });
        });
        const getSum = (group) => {
            const targets = list.filter(item => group.includes(item.part));
            if (targets.some(d => d.status === "急募")) return "急募あり！";
            if (targets.some(d => d.status === "募集中")) return "募集中";
            return "募集なし";
        };
        const summary = { wood: getSum(groupWood), brass: getSum(groupBrass), perc: getSum(groupPerc) };
        await updateFirebase({ fullMemberData: { term: termName.value, list }, recruitData: summary });
        alert("保存完了！");
    }
    function initMemberForm(saved) {
        const tbody = document.getElementById('memberInputs');
        tbody.innerHTML = partsList.map(part => {
            const row = (saved && saved.list) ? (saved.list.find(d => d.part === part) || { act:0, rest:0, count:0, status:"なし", note:"" }) : { act:0, rest:0, count:0, status:"なし", note:"" };
            return `<tr><td><strong>${part}</strong></td>
                <td><input type="number" class="in-act" value="${row.act}" min="0"></td>
                <td><input type="number" class="in-rest" value="${row.rest}" min="0"></td>
                <td><input type="number" class="in-count" value="${row.count}" min="0"></td>
                <td><select class="in-status">
                    <option value="募集中" ${row.status==='募集中'?'selected':''}>募集中</option>
                    <option value="急募" ${row.status==='急募'?'selected':''}>急募</option>
                    <option value="なし" ${row.status==='なし'?'selected':''}>なし</option>
                </select></td>
                <td><input type="text" class="in-note" value="${row.note}"></td></tr>`;
        }).join('');
        if(saved) termName.value = saved.term || "";
    }

    // --- その他 ---
    async function saveConcert() {
        const data = { title:title.value, date:date.value, venue:venue.value, time:time.value, program:program.value };
        await updateFirebase({ concertData: data });
        alert("保存完了");
    }
    async function saveAboutText() {
        await updateFirebase({ aboutContent: aboutText.value });
        alert("保存完了");
    }
    async function addAward() {
        const docSnap = await getDoc(websiteRef);
        let awards = docSnap.exists() ? (docSnap.data().awards || []) : [];
        awards.unshift({ year:awardYear.value, name:awardName.value, result:awardResult.value });
        await updateFirebase({ awards: awards });
        displayAwardList(awards);
    }
    function displayAwardList(awards) {
        awardList.innerHTML = awards.map((a, i) => `<div class="list-item"><span>${a.year} ${a.name} ${a.result}</span><button class="delete-btn" onclick="window.deleteAward(${i})">削除</button></div>`).join('');
    }
    window.deleteAward = async (i) => {
        const docSnap = await getDoc(websiteRef);
        let list = docSnap.data().awards;
        list.splice(i, 1);
        await updateFirebase({ awards: list });
        displayAwardList(list);
    };

    // --- ギャラリー ---
    async function uploadPhotos() {
        const files = photoInput.files;
        const docSnap = await getDoc(websiteRef);
        let gallery = docSnap.exists() ? (docSnap.data().galleryData || []) : [];
        for (let file of files) {
            const res = await resizeImage(file, 800, 600);
            gallery.unshift(res); if(gallery.length > 12) gallery.pop();
        }
        await updateFirebase({ galleryData: gallery });
        renderGallery(gallery);
    }
    function renderGallery(g) {
        galleryStatus.innerHTML = g.map((src, i) => `<div class="gallery-item"><img src="${src}"><button style="position:absolute;top:0;right:0;" onclick="window.deletePhoto(${i})">×</button></div>`).join('');
    }
    window.deletePhoto = async (i) => {
        const docSnap = await getDoc(websiteRef);
        let list = docSnap.data().galleryData;
        list.splice(i, 1);
        await updateFirebase({ galleryData: list });
        renderGallery(list);
    };

    function resizeImage(file, maxWidth, maxHeight) {
        return new Promise((resolve) => {
            const reader = new FileReader(); reader.readAsDataURL(file);
            reader.onload = (e) => {
                const img = new Image(); img.src = e.target.result;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    let w = img.width, h = img.height;
                    if (w > h) { if (w > maxWidth) { h *= maxWidth / w; w = maxWidth; } }
                    else { if (h > maxHeight) { w *= maxHeight / h; h = maxHeight; } }
                    canvas.width = w; canvas.height = h;
                    canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                    resolve(canvas.toDataURL('image/jpeg', 0.7));
                };
            };
        });
    }

    // --- 初期ロード ---
    window.addEventListener('DOMContentLoaded', async () => {
        const docSnap = await getDoc(websiteRef);
        if (docSnap.exists()) {
            const data = docSnap.data();
            if(data.heroImageData) renderHeroPreview(data.heroImageData);
            if(data.concertData) {
                const c = data.concertData;
                title.value=c.title||""; date.value=c.date||""; venue.value=c.venue||""; time.value=c.time||""; program.value=c.program||"";
            }
            if(data.concertArchives) displayArchiveList(data.concertArchives);
            if(data.blogs) displayBlogList(data.blogs);
            if(data.awards) displayAwardList(data.awards);
            if(data.fullMemberData) initMemberForm(data.fullMemberData);
            else initMemberForm(null);
            if(data.galleryData) renderGallery(data.galleryData);
            aboutText.value = data.aboutContent || "";
        } else {
            initMemberForm(null);
        }
        
        const auth = JSON.parse(localStorage.getItem('adminAuth')) || { id: '1234', pass: '1234' };
        newId.value = auth.id;

        // イベント登録
        document.getElementById('btnHero').onclick = uploadHero;
        document.getElementById('btnArchive').onclick = addArchive;
        document.getElementById('btnBlog').onclick = addBlog;
        document.getElementById('btnMember').onclick = saveMemberTable;
        document.getElementById('btnConcert').onclick = saveConcert;
        document.getElementById('btnAbout').onclick = saveAboutText;
        document.getElementById('btnAward').onclick = addAward;
        document.getElementById('btnGallery').onclick = uploadPhotos;
        document.getElementById('btnClearGallery').onclick = async () => { if(confirm("消去？")) { await updateFirebase({ galleryData: [] }); renderGallery([]); } };
        document.getElementById('btnAuth').onclick = () => { localStorage.setItem('adminAuth', JSON.stringify({ id:newId.value, pass:newPass.value })); alert("更新完了"); };
    });
</script>
</body>
</html>
