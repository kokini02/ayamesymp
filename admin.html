<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>管理画面 - 彩シンフォニックバンド</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary:#2c3e50; --accent:#e67e22; --bg:#f4f6f8; }
        body { margin:0; font-family:'Noto Sans JP', sans-serif; background:var(--bg); padding-bottom: 50px; }
        .header { background:var(--primary); color:white; padding:20px; text-align:center; font-size:1.5rem; font-weight:bold; }
        .container { max-width:1000px; margin:auto; padding:40px 20px; display:grid; gap:30px; }
        .card { background:white; padding:30px; border-radius:15px; box-shadow:0 10px 30px rgba(0,0,0,0.05); }
        .card h2 { margin-top:0; color:var(--primary); border-left:5px solid var(--accent); padding-left:10px; margin-bottom: 20px; }
        label { display:block; margin-top:15px; font-weight:bold; font-size: 0.9rem; }
        input, textarea { width:100%; padding:12px; margin-top:8px; border-radius:8px; border:1px solid #ddd; box-sizing: border-box; }
        button { margin-top:20px; width:100%; padding:15px; border:none; border-radius:30px; background:var(--primary); color:white; font-weight:bold; cursor:pointer; transition: 0.3s; }
        button:hover { opacity: 0.8; transform: translateY(-2px); }
        
        /* プレビュー・テーブル用 */
        .gallery-preview { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 15px; margin-top: 20px; border-top: 1px solid #eee; padding-top: 20px; }
        .gallery-item { position: relative; }
        .gallery-item img { width: 100%; aspect-ratio: 1/1; object-fit: cover; border-radius: 8px; border: 1px solid #ddd; }
        .delete-photo { position: absolute; top: 5px; right: 5px; background: rgba(231, 76, 60, 0.9); color: white; border: none; border-radius: 50%; width: 25px; height: 25px; cursor: pointer; font-size: 12px; display: flex; align-items: center; justify-content: center; }
        
        table { width: 100%; border-collapse: collapse; font-size: 0.8rem; margin-top: 10px; }
        th, td { border: 1px solid #eee; padding: 6px; text-align: center; }
        th { background: #f8f9fa; position: sticky; top: 0; }
        .archive-item { border-bottom: 1px solid #eee; padding: 10px 0; display: flex; justify-content: space-between; align-items: center; }
    </style>
</head>
<body>

<div class="header">彩シンフォニックバンド 管理画面</div>

<div class="container">
    <div style="text-align:center;"><a href="index.html" style="text-decoration: none; color: var(--primary); font-weight: bold;">← サイトを確認する</a></div>

    <div class="card">
        <h2>🎵 次回の演奏会情報</h2>
        <label>タイトル</label><input id="title">
        <label>日付</label><input id="date">
        <label>会場</label><input id="venue">
        <label>時間</label><input id="time">
        <label>料金</label><input id="price">
        <label>曲目</label><textarea id="program" rows="3"></textarea>
        <button onclick="saveConcert()">トップページを更新</button>
    </div>

    <div class="card">
        <h2>📸 フォトギャラリー更新</h2>
        <input type="file" id="photoInput" accept="image/*" multiple>
        <button onclick="uploadPhotos()" style="background:#3498db;">選択した写真をすべて追加</button>
        <div id="galleryStatus" class="gallery-preview"></div>
        <button onclick="clearPhotos()" style="background:#95a5a6; font-size: 0.8rem; padding: 10px; margin-top: 20px;">全ての写真を削除</button>
    </div>

    <div class="card">
        <h2>👥 在籍人数・募集状況の詳細</h2>
        <label>表示する学期名</label>
        <input id="termName" placeholder="例: 2026年度 春学期">
        <div style="overflow-x: auto; max-height: 500px;">
            <table>
                <thead>
                    <tr>
                        <th>パート</th>
                        <th>活動</th>
                        <th>休団</th>
                        <th>募集人数</th>
                        <th>募集状況</th>
                        <th>備考</th>
                    </tr>
                </thead>
                <tbody id="memberInputs"></tbody>
            </table>
        </div>
        <button onclick="saveMemberTable()" style="background:#16a085;">在籍人数・募集人数を更新</button>
    </div>

    <div class="card">
        <h2>📚 過去の演奏会アーカイブ追加</h2>
        <label>タイトル</label><input id="arcTitle">
        <label>日付</label><input id="arcDate">
        <label>会場</label><input id="arcVenue">
        <label>曲目</label><textarea id="arcProgram" rows="3"></textarea>
        <button onclick="addArchive()" style="background:#8e44ad;">アーカイブに追加</button>
        <div id="archiveList" style="margin-top:20px; font-size:0.8rem; color:#666;"></div>
    </div>

    <div class="card" style="border:2px solid #e74c3c;">
        <h2>🔐 ログイン設定</h2>
        <label>ユーザーID</label><input id="newId">
        <label>パスワード</label><input id="newPass" type="password">
        <button onclick="updateAuth()" style="background:#e74c3c;">認証情報を更新</button>
    </div>
</div>

<script>
    if (sessionStorage.getItem('isLoggedIn') !== 'true') { window.location.href = 'login.html'; }

    const partsList = ["フルート", "オーボエ", "ファゴット", "クラリネット", "バスクラリネット", "アルトサックス", "テナーサックス", "バリトンサックス", "ホルン", "トランペット", "トロンボーン", "バストロンボーン", "ユーフォニアム", "チューバ", "弦バス", "打楽器", "ハープ"];

    function initMemberForm() {
        const tbody = document.getElementById('memberInputs');
        const saved = JSON.parse(localStorage.getItem('fullMemberData')) || { term: "", list: [] };
        
        tbody.innerHTML = partsList.map(part => {
            const row = saved.list.find(d => d.part === part) || { act:0, rest:0, count:"", status:"", note:"" };
            return `<tr>
                <td><strong>${part}</strong></td>
                <td><input type="number" class="in-act" value="${row.act}" style="width:40px; padding:4px;"></td>
                <td><input type="number" class="in-rest" value="${row.rest}" style="width:40px; padding:4px;"></td>
                <td><input type="text" class="in-count" value="${row.count || ''}" placeholder="2名" style="width:50px; padding:4px;"></td>
                <td><input type="text" class="in-status" value="${row.status}" placeholder="募集中" style="width:65px; padding:4px;"></td>
                <td><input type="text" class="in-note" value="${row.note}" placeholder="備考" style="padding:4px;"></td>
            </tr>`;
        }).join('');
        document.getElementById('termName').value = saved.term || "";
    }

    function saveMemberTable() {
        const rows = document.getElementById('memberInputs').querySelectorAll('tr');
        const list = [];
        let totalAct = 0, totalRest = 0;
        
        rows.forEach((row, i) => {
            const act = parseInt(row.querySelector('.in-act').value) || 0;
            const rest = parseInt(row.querySelector('.in-rest').value) || 0;
            list.push({ 
                part: partsList[i], 
                act: act, 
                rest: rest, 
                count: row.querySelector('.in-count').value, // 募集人数
                status: row.querySelector('.in-status').value, 
                note: row.querySelector('.in-note').value 
            });
            totalAct += act; totalRest += rest;
        });
        localStorage.setItem('fullMemberData', JSON.stringify({ 
            term: document.getElementById('termName').value, 
            list, totalAct, totalRest 
        }));
        alert("情報を更新しました。在籍人数ページに募集人数も反映されます。");
    }

    // --- 写真関連 ---
    async function uploadPhotos() {
        const fileInput = document.getElementById('photoInput');
        const files = fileInput.files;
        if (files.length === 0) return alert("ファイルを選択してください");
        let gallery = JSON.parse(localStorage.getItem("galleryData")) || [];
        for (let file of files) {
            const resized = await resizeImage(file, 800, 600);
            gallery.unshift(resized);
            if (gallery.length > 12) gallery.pop();
        }
        localStorage.setItem("galleryData", JSON.stringify(gallery));
        renderPreview();
        fileInput.value = "";
        alert("写真を保存しました");
    }

    function resizeImage(file, maxWidth, maxHeight) {
        return new Promise((resolve) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = (e) => {
                const img = new Image();
                img.src = e.target.result;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    let w = img.width, h = img.height;
                    if (w > h) { if (w > maxWidth) { h *= maxWidth / w; w = maxWidth; } }
                    else { if (h > maxHeight) { w *= maxHeight / h; h = maxHeight; } }
                    canvas.width = w; canvas.height = h;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, w, h);
                    resolve(canvas.toDataURL('image/jpeg', 0.7));
                };
            };
        });
    }

    function renderPreview() {
        const gallery = JSON.parse(localStorage.getItem("galleryData")) || [];
        const container = document.getElementById('galleryStatus');
        container.innerHTML = gallery.map((src, i) => `<div class="gallery-item"><img src="${src}"><button class="delete-photo" onclick="deleteSinglePhoto(${i})">×</button></div>`).join('');
    }

    function deleteSinglePhoto(i) {
        let gallery = JSON.parse(localStorage.getItem("galleryData")) || [];
        gallery.splice(i, 1);
        localStorage.setItem("galleryData", JSON.stringify(gallery));
        renderPreview();
    }

    function clearPhotos() { if(confirm("全て削除しますか？")) { localStorage.removeItem("galleryData"); renderPreview(); } }

    // --- アーカイブ ---
    function addArchive() {
        const data = { title:arcTitle.value, date:arcDate.value, venue:arcVenue.value, program:arcProgram.value };
        let archives = JSON.parse(localStorage.getItem("concertArchives")) || [];
        archives.unshift(data);
        localStorage.setItem("concertArchives", JSON.stringify(archives));
        displayArchiveList();
        arcTitle.value = ""; arcProgram.value = "";
        alert("アーカイブに追加しました");
    }

    function displayArchiveList() {
        const archives = JSON.parse(localStorage.getItem("concertArchives")) || [];
        document.getElementById('archiveList').innerHTML = archives.map((a, i) => `
            <div class="archive-item">${a.date} ${a.title} <button onclick="deleteArchive(${i})" style="width:auto; padding:2px 8px; margin:0; background:#e74c3c; font-size:0.7rem;">削除</button></div>
        `).join('');
    }

    function deleteArchive(i) {
        let archives = JSON.parse(localStorage.getItem("concertArchives")) || [];
        archives.splice(i, 1);
        localStorage.setItem("concertArchives", JSON.stringify(archives));
        displayArchiveList();
    }

    // --- 認証 ---
    function updateAuth(){
        localStorage.setItem('adminAuth', JSON.stringify({ id:newId.value, pass:newPass.value })); alert("更新完了");
    }

    function saveConcert(){
        const data = { title:title.value, date:date.value, venue:venue.value, time:time.value, price:price.value, program:program.value };
        localStorage.setItem("concertData", JSON.stringify(data)); alert("保存しました");
    }

    window.onload = () => {
        initMemberForm();
        renderPreview();
        displayArchiveList();
        const c = JSON.parse(localStorage.getItem("concertData"));
        if(c){ title.value=c.title; date.value=c.date; venue.value=c.venue; time.value=c.time; price.value=c.price; program.value=c.program; }
        const auth = JSON.parse(localStorage.getItem('adminAuth')) || { id: '1234', pass: '1234' };
        newId.value = auth.id;
    };
</script>
</body>
</html>
