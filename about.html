<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>楽団紹介 - 彩シンフォニックバンド</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family:'Noto Sans JP', sans-serif; line-height:1.8; margin:0; background:#fdfdfd; }
        .header { background:#2c3e50; color:white; padding:60px 20px; text-align:center; }
        nav { background:#f4f4f4; padding:15px; text-align:center; position:sticky; top:0; z-index:100; }
        nav a { margin:0 15px; text-decoration:none; color:#2c3e50; font-weight:bold; }
        .container { max-width:800px; margin:40px auto; padding:0 20px; }
        h2 { border-bottom:3px solid #e67e22; padding-bottom:10px; color:#2c3e50; }
        table { width:100%; border-collapse:collapse; margin:20px 0; }
        th, td { border-bottom:1px solid #eee; padding:12px; text-align:left; }
        th { background:#f9f9f9; }
        .gold { color:#d4af37; font-weight:bold; }
    </style>
</head>
<body>

<div class="header">
    <h1>About Us</h1>
    <p>彩シンフォニックバンドの歩み</p>
</div>

<nav>
    <a href="index.html">トップ</a>
    <a href="about.html">楽団紹介</a>
    <a href="recruit.html">団員募集</a>
</nav>

<div class="container">
    <section>
        <h2>楽団について</h2>
        <p>京都を拠点に活動する一般吹奏楽団です。「彩り豊かな音楽」をモットーに、日々練習に励んでいます。</p>
    </section>

    <section>
        <h2>🏆 コンクール実績</h2>
        <table>
            <thead><tr><th>年度</th><th>大会名</th><th>結果</th></tr></thead>
            <tbody id="awardDisplay">
                </tbody>
        </table>
    </section>
</div>

<script>
    const awards = JSON.parse(localStorage.getItem("awards")) || [];
    const area = document.getElementById("awardDisplay");
    if(awards.length === 0) {
        area.innerHTML = "<tr><td colspan='3'>実績は準備中です</td></tr>";
    } else {
        awards.forEach(a => {
            area.innerHTML += `<tr><td>${a.year}</td><td>${a.name}</td><td class="gold">${a.result}</td></tr>`;
        });
    }
</script>
</body>
</html>
